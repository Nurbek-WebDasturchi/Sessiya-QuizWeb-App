<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizWeb App — Ro'yxatdan o'tish</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div
      class="auth-container d-flex align-items-center justify-content-center min-vh-100">
      <div class="auth-card card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="auth-logo mb-3">
              <i class="fas fa-user-plus fa-3x text-success"></i>
            </div>
            <h2 class="fw-bold text-dark">Ro'yxatdan o'tish</h2>
            <p class="text-muted">Yangi akkaunt yarating</p>
          </div>

          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">To'liq ism</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-user"></i
                ></span>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  id="regName"
                  placeholder="Ism Familiya"
                  required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-envelope"></i
                ></span>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  id="regEmail"
                  placeholder="student@university.uz"
                  required />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Fakultet</label>
              <select
                class="form-select form-select-lg"
                id="regFaculty"
                required>
                <option value="" disabled selected>Tanlang...</option>
                <option value="IT">Axborot texnologiyalari</option>
                <option value="Iqtisodiyot">Iqtisodiyot</option>
                <option value="Huquq">Huquqshunoslik</option>
                <option value="Tibbiyot">Tibbiyot</option>
                <option value="Pedagogika">Pedagogika</option>
                <option value="Muhandislik">Muhandislik</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Parol</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-lock"></i
                ></span>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  id="regPassword"
                  placeholder="Kamida 6 ta belgi"
                  required
                  minlength="6" />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Parolni tasdiqlang</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-lock"></i
                ></span>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  id="regPasswordConfirm"
                  placeholder="Parolni qayta kiriting"
                  required />
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg rounded-pill">
                <i class="fas fa-user-check me-2"></i>Ro'yxatdan o'tish
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted">
              Akkauntingiz bormi?
              <a href="./login.html" class="text-primary fw-semibold">Kirish</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("regName").value.trim();
          const email = document.getElementById("regEmail").value.trim();
          const faculty = document.getElementById("regFaculty").value;
          const password = document.getElementById("regPassword").value;
          const confirm = document.getElementById("regPasswordConfirm").value;

          if (password !== confirm) {
            showAlert("danger", "Parollar mos kelmadi!");
            return;
          }

          const users = JSON.parse(localStorage.getItem("users") || "[]");
          if (users.find((u) => u.email === email)) {
            showAlert("danger", "Bu email allaqachon ro'yxatdan o'tgan!");
            return;
          }

          users.push({
            name,
            email,
            faculty,
            password,
            createdAt: new Date().toISOString(),
          });
          localStorage.setItem("users", JSON.stringify(users));
          showAlert("success", "Muvaffaqiyatli ro'yxatdan o'tdingiz!");
          setTimeout(() => (window.location.href = "login.html"), 1500);
        });
    </script>
  </body>
</html>
