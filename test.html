<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Test ishlash</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
  </head>
  <body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">
          <i class="fas fa-graduation-cap me-2"></i>TestPlatform
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white" id="testSubject"></span>
          <a
            href="dashboard.html"
            class="btn btn-outline-light btn-sm rounded-pill"
            onclick="return confirm('Testdan chiqmoqchimisiz?');">
            <i class="fas fa-times me-1"></i>Chiqish
          </a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <!-- Timer & Progress -->
      <div class="row mb-3">
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-3 text-center">
              <small class="text-muted d-block">Qolgan vaqt</small>
              <h4 class="fw-bold mb-0" id="timer">00:00</h4>
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-3">
              <div class="d-flex justify-content-between mb-1">
                <small class="fw-semibold">Jarayon</small>
                <small class="text-primary fw-bold" id="progressText"
                  >0 / 50</small
                >
              </div>
              <div class="progress" style="height: 8px">
                <div
                  class="progress-bar bg-primary progress-bar-striped progress-bar-animated"
                  id="progressBar"
                  style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4" id="questionCard">
            <div class="card-body p-4 p-md-5">
              <div
                class="d-flex justify-content-between align-items-center mb-3">
                <span class="badge bg-primary rounded-pill" id="questionNumber"
                  >Savol 1</span
                >
                <span class="text-muted small" id="questionCount"></span>
              </div>

              <h5 class="fw-bold mb-4" id="questionText">Yuklanmoqda...</h5>

              <div id="optionsContainer" class="d-grid gap-2 mb-4">
                <!-- Options rendered here -->
              </div>

              <div class="d-flex justify-content-between">
                <button
                  class="btn btn-outline-secondary rounded-pill px-4"
                  id="prevBtn"
                  onclick="prevQuestion()"
                  disabled>
                  <i class="fas fa-arrow-left me-1"></i>Oldingi
                </button>
                <button
                  class="btn btn-primary rounded-pill px-4"
                  id="nextBtn"
                  onclick="nextQuestion()">
                  Keyingi<i class="fas fa-arrow-right ms-1"></i>
                </button>
                <button
                  class="btn btn-success rounded-pill px-4 d-none"
                  id="finishBtn"
                  onclick="finishTest()">
                  <i class="fas fa-check me-1"></i>Tugatish
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Question Navigator -->
      <div class="row justify-content-center mt-3">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3">
              <h6 class="fw-bold mb-2">
                <i class="fas fa-th me-2"></i>Savollar xaritasi
              </h6>
              <div class="d-flex flex-wrap gap-2" id="questionNav">
                <!-- Question numbers rendered here -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));
      if (!user) window.location.href = "login.html";

      const test = JSON.parse(localStorage.getItem("currentTest"));
      if (!test) {
        window.location.href = "dashboard.html";
      }

      document.getElementById("testSubject").textContent = test.subject;

      // Prepare questions (random 50 or all)
      const allQuestions = test.questions;
      const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
      const selectedQuestions = shuffled.slice(0, 50);
      const totalQ = selectedQuestions.length;

      let currentQ = 0;
      let answers = new Array(totalQ).fill(null);
      let timerInterval;
      let timeLeft = totalQ * 60; // 1 min per question

      // Render question navigator
      const navContainer = document.getElementById("questionNav");
      for (let i = 0; i < totalQ; i++) {
        navContainer.innerHTML += `
        <button class="btn btn-sm rounded-pill q-nav-btn" data-index="${i}" onclick="goToQuestion(${i})" style="width:36px;height:36px;padding:0;">
          ${i + 1}
        </button>
      `;
      }

      function renderQuestion() {
        const q = selectedQuestions[currentQ];
        document.getElementById("questionNumber").textContent =
          `Savol ${currentQ + 1}`;
        document.getElementById("questionCount").textContent =
          `${currentQ + 1} / ${totalQ}`;
        document.getElementById("questionText").textContent = q.question;

        // Shuffle options for display
        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        shuffledOptions.forEach((opt) => {
          const isSelected = answers[currentQ] === opt.letter;
          container.innerHTML += `
          <button class="btn btn-lg text-start rounded-3 option-btn ${isSelected ? "selected" : ""}" 
                  onclick="selectAnswer('${opt.letter}')" data-letter="${opt.letter}">
            <span class="badge bg-light text-dark me-2">${opt.letter}</span>
            ${opt.text}
          </button>
        `;
        });

        // Update buttons
        document.getElementById("prevBtn").disabled = currentQ === 0;
        if (currentQ === totalQ - 1) {
          document.getElementById("nextBtn").classList.add("d-none");
          document.getElementById("finishBtn").classList.remove("d-none");
        } else {
          document.getElementById("nextBtn").classList.remove("d-none");
          document.getElementById("finishBtn").classList.add("d-none");
        }

        updateProgress();
        updateNav();
      }

      function selectAnswer(letter) {
        answers[currentQ] = letter;
        renderQuestion();
      }

      function nextQuestion() {
        if (currentQ < totalQ - 1) {
          currentQ++;
          renderQuestion();
        }
      }

      function prevQuestion() {
        if (currentQ > 0) {
          currentQ--;
          renderQuestion();
        }
      }

      function goToQuestion(idx) {
        currentQ = idx;
        renderQuestion();
      }

      function updateProgress() {
        const answered = answers.filter((a) => a !== null).length;
        const pct = (answered / totalQ) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          `${answered} / ${totalQ}`;
      }

      function updateNav() {
        document.querySelectorAll(".q-nav-btn").forEach((btn) => {
          const idx = parseInt(btn.dataset.index);
          btn.className = "btn btn-sm rounded-pill q-nav-btn";
          if (idx === currentQ) {
            btn.classList.add("btn-primary");
          } else if (answers[idx] !== null) {
            btn.classList.add("btn-success");
          } else {
            btn.classList.add("btn-outline-secondary");
          }
        });
      }

      // Timer
      function startTimer() {
        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            finishTest();
            return;
          }
          const min = Math.floor(timeLeft / 60)
            .toString()
            .padStart(2, "0");
          const sec = (timeLeft % 60).toString().padStart(2, "0");
          document.getElementById("timer").textContent = `${min}:${sec}`;

          if (timeLeft <= 60) {
            document.getElementById("timer").classList.add("text-danger");
          }
        }, 1000);
      }

      function finishTest() {
        clearInterval(timerInterval);

        let correct = 0;
        let wrong = 0;
        const details = [];

        selectedQuestions.forEach((q, i) => {
          const isCorrect = answers[i] === q.correctAnswer;
          if (isCorrect) correct++;
          else wrong++;
          details.push({
            question: q.question,
            userAnswer: answers[i],
            correctAnswer: q.correctAnswer,
            isCorrect,
            options: q.options,
          });
        });

        const percentage = Math.round((correct / totalQ) * 100);
        const timeSpent = test.questions.length * 60 - timeLeft;
        const minutes = Math.floor(timeSpent / 60);
        const seconds = timeSpent % 60;

        const result = {
          resultId: "result_" + Date.now(),
          testId: test.id,
          subject: test.subject,
          totalQuestions: totalQ,
          correct,
          wrong,
          percentage,
          timeSpent: `${minutes}m ${seconds}s`,
          details,
          answers,
          selectedQuestions,
          completedAt: new Date().toISOString(),
        };

        // Save completed tests
        const completed = JSON.parse(
          localStorage.getItem("completed_" + user.email) || "[]",
        );
        completed.push(result);
        localStorage.setItem(
          "completed_" + user.email,
          JSON.stringify(completed),
        );
        localStorage.setItem("currentResult", JSON.stringify(result));

        window.location.href = "result.html";
      }

      // Init
      renderQuestion();
      startTimer();
    </script>
  </body>
</html>
