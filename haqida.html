<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texnologiyalar</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 600px;
        width: 90%;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      h2 {
        color: #555;
        margin: 10px 0;
        padding: 10px;
        border-left: 5px solid #4facfe;
        background: #f7f7f7;
        border-radius: 5px;
      }

      h2:last-child {
        border-left-color: #00c853;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>QuizWeb Platformasi qurishda ishlatilgan texnologiyalar:</h1>

      <h2>HTML, CSS, Bootstrap va JavaScript — Frontend uchun</h2>

      <h2>Node JS, Express JS va MongoDB — Backend uchun</h2>
    </div>
  </body>
</html>
