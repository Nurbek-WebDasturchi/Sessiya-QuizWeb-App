<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestPlatform — Kirish</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link href="./assets/css/styling.css" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div
      class="auth-container d-flex align-items-center justify-content-center min-vh-100">
      <div class="auth-card card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div class="auth-logo mb-3">
              <i class="fas fa-graduation-cap fa-3x text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark">QuizWeb App</h2>
            <p class="text-muted">Universitet test tizimi</p>
          </div>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-envelope"></i
                ></span>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  id="loginEmail"
                  placeholder="student@university.uz"
                  required />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Parol</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-lock"></i
                ></span>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  id="loginPassword"
                  placeholder="••••••••"
                  required />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="togglePassword">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                <i class="fas fa-sign-in-alt me-2"></i>Kirish
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted">
              Akkauntingiz yo'qmi?
              <a href="./register.html" class="text-primary fw-semibold"
                >Ro'yxatdan o'ting</a
              >
            </p>
          </div>

          <div class="divider my-4">
            <span class="text-muted small">Demo uchun</span>
          </div>
          <div class="text-center">
            <button
              class="btn btn-outline-primary btn-sm rounded-pill"
              onclick="demoLogin()">
              <i class="fas fa-play me-1"></i>Demo kirish
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;
          const users = JSON.parse(localStorage.getItem("users") || "[]");
          const user = users.find(
            (u) => u.email === email && u.password === password,
          );
          if (user) {
            localStorage.setItem("currentUser", JSON.stringify(user));
            window.location.href = "dashboard.html";
          } else {
            showAlert("danger", "Email yoki parol noto'g'ri!");
          }
        });

      document
        .getElementById("togglePassword")
        .addEventListener("click", function () {
          const pwd = document.getElementById("loginPassword");
          const icon = this.querySelector("i");
          if (pwd.type === "password") {
            pwd.type = "text";
            icon.className = "fas fa-eye-slash";
          } else {
            pwd.type = "password";
            icon.className = "fas fa-eye";
          }
        });

      function demoLogin() {
        const demoUser = {
          name: "Demo Student",
          email: "demo@uz",
          faculty: "IT",
        };
        localStorage.setItem("currentUser", JSON.stringify(demoUser));
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
